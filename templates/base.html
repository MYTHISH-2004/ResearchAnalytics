<!DOCTYPE html>
<html>
<head>
    <title>Faculty Analytics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-page: #eef4ff;
            --sidebar-start: #0b132b;
            --sidebar-end: #1f2a52;
            --text-main: #0f172a;
            --text-soft: #64748b;
            --heading-primary: #2563eb;
            --heading-secondary: #0ea5a4;
            --heading-tertiary: #0f172a;
            --line: #d3dded;
            --card-bg: #ffffff;
            --card-shadow: 0 16px 34px rgba(15, 23, 42, 0.11);
            --nav-hover: rgba(125, 211, 252, 0.18);
            --nav-active-bg: rgba(56, 189, 248, 0.3);
            --nav-active-border: rgba(34, 211, 238, 0.95);
        }

        body {
            margin: 0;
            font-family: "Manrope", sans-serif;
            background: radial-gradient(circle at 10% -10%, #bfdbfe 0%, transparent 35%),
                        radial-gradient(circle at 90% 120%, #a7f3d0 0%, transparent 30%),
                        radial-gradient(circle at 60% 0%, #fde68a 0%, transparent 18%),
                        var(--bg-page);
            overflow-x: hidden;
            color: var(--text-main);
        }

        * {
            transition: all 0.18s cubic-bezier(.4,0,.2,1);
        }

        h1, h2, h3 {
            color: var(--heading-primary);
        }

        h4, h5, h6 {
            color: var(--heading-secondary);
        }

        .app-shell {
            min-height: 100vh;
        }

        .sidebar {
            min-height: 100vh;
            color: #e2e8f0;
            background: linear-gradient(180deg, var(--sidebar-start), var(--sidebar-end));
            border-right: 1px solid rgba(148, 163, 184, 0.22);
            padding: 24px 18px;
            position: sticky;
            top: 0;
        }

        .brand {
            text-align: center;
            padding: 10px 8px 14px;
        }

        .brand-logo {
            width: 56px;
            height: 56px;
            object-fit: contain;
            margin-bottom: 8px;
        }

        .brand h4 {
            margin-bottom: 0;
            font-weight: 800;
            letter-spacing: 0.3px;
            color: #f8fafc;
        }

        .brand small {
            color: #94a3b8;
            font-weight: 500;
        }

        .nav-panel {
            margin-top: 10px;
            gap: 6px;
        }

        .nav-link {
            color: #dbe5f4;
            padding: 10px 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            border-left: 3px solid transparent;
        }

        .nav-link i {
            font-size: 1.02rem;
        }

        .nav-link:hover {
            color: #f8fafc;
            background: var(--nav-hover);
            transform: translateX(3px);
        }

        .nav-link.active {
            color: #f8fafc;
            background: var(--nav-active-bg);
            border-left-color: var(--nav-active-border);
            box-shadow: inset 0 0 0 1px rgba(34, 211, 238, 0.35);
        }

        .logout {
            margin-top: 18px;
            border-top: 1px solid rgba(148, 163, 184, 0.28);
            padding-top: 16px;
        }

        .content-area {
            min-height: 100vh;
            padding: 26px;
        }

        .return-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 12px;
        }

        .btn {
            border-radius: 11px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.24);
        }

        .card {
            border-radius: 16px;
            border: 1px solid var(--line);
            background: var(--card-bg);
            box-shadow: var(--card-shadow);
        }

        .table {
            --bs-table-bg: transparent;
        }

        .table tbody tr:hover {
            background-color: #eff6ff;
        }

        .table thead th {
            color: #334155;
            font-size: 0.87rem;
            letter-spacing: 0.25px;
            border-bottom-color: #d8e2ef;
        }

        @media (max-width: 991px) {
            .sidebar {
                min-height: auto;
                position: static;
            }

            .content-area {
                padding: 16px;
            }
        }
    </style>
</head>
<body>

<div class="container-fluid app-shell">
    <div class="row g-0">
        <div class="col-lg-3 col-xl-2 sidebar">
            <div class="brand">
                <img src="{{ url_for('static', filename='logo.svg') }}" alt="Faculty Analytics logo" class="brand-logo">
                <h4>Faculty</h4>
                <small>Academic Analytics</small>
            </div>

            <div class="nav flex-column nav-panel">
                <a href="/dashboard" class="nav-link {% if request.path == '/dashboard' %}active{% endif %}">
                    <i class="bi bi-speedometer2"></i><span>Dashboard</span>
                </a>
                <a href="/students" class="nav-link {% if request.path == '/students' %}active{% endif %}">
                    <i class="bi bi-people-fill"></i><span>Students</span>
                </a>
                <a href="/attendance" class="nav-link {% if request.path == '/attendance' %}active{% endif %}">
                    <i class="bi bi-calendar2-check-fill"></i><span>Attendance</span>
                </a>
                <a href="/marks" class="nav-link {% if request.path == '/marks' %}active{% endif %}">
                    <i class="bi bi-bar-chart-fill"></i><span>Marks</span>
                </a>
                <a href="/reports" class="nav-link {% if request.path == '/reports' %}active{% endif %}">
                    <i class="bi bi-graph-up-arrow"></i><span>Reports</span>
                </a>
            </div>

            <div class="logout">
                <a href="/logout" class="nav-link">
                    <i class="bi bi-box-arrow-right"></i><span>Logout</span>
                </a>
            </div>
        </div>

        <div class="col-lg-9 col-xl-10 content-area">
            {% if 'user' in session and (request.path != '/dashboard' or request.args.get('student_roll')) %}
            <div class="return-bar">
                <a href="/dashboard" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-arrow-left-circle"></i> Return to Dashboard
                </a>
            </div>
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </div>
</div>

</body>
</html>
