<!DOCTYPE html>
<html>
<head>
    <title>Faculty Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            margin: 0;
            font-family: "Manrope", sans-serif;
            background: radial-gradient(circle at 15% 20%, rgba(96, 165, 250, 0.35), transparent 34%),
                        radial-gradient(circle at 85% 85%, rgba(16, 185, 129, 0.3), transparent 32%),
                        radial-gradient(circle at 60% 10%, rgba(251, 191, 36, 0.25), transparent 28%),
                        linear-gradient(130deg, #111827, #1d4ed8 46%, #059669);
            display: grid;
            place-items: center;
            padding: 18px;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 22px 50px rgba(15, 23, 42, 0.25);
            backdrop-filter: blur(12px);
        }

        .logo {
            width: 74px;
            height: auto;
        }

        .brand-title {
            font-weight: 800;
            color: #1d4ed8;
            margin-bottom: 2px;
        }

        .brand-subtitle {
            color: #0f766e;
            font-weight: 600;
        }

        .form-label {
            font-weight: 700;
            color: #1e3a8a;
        }

        .form-control {
            border-radius: 12px;
            padding: 11px;
            border-color: #cbd5e1;
        }

        .form-control:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 0.2rem rgba(56, 189, 248, 0.15);
        }

        .btn-login {
            border-radius: 12px;
            padding: 10px;
            font-weight: 700;
            letter-spacing: 0.2px;
            background: linear-gradient(120deg, #2563eb, #0ea5a4);
            border: none;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(14, 116, 144, 0.35);
        }
    </style>
</head>
<body>

<div class="card p-4 border-0 login-card">
    <div class="text-center mb-3">
        <img src="{{ url_for('static', filename='logo.svg') }}" alt="Faculty Analytics logo" class="logo mb-2">
        <h4 class="brand-title">Faculty Analytics</h4>
        <small class="brand-subtitle">Secure Academic Portal</small>
    </div>

    {% if message %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}

    <form method="POST">
        <input type="hidden" id="login_mode" name="login_mode" value="email">

        <div class="mb-3">
            <label class="form-label d-block">Login Method</label>
            <div class="btn-group w-100" role="group" aria-label="Login method">
                <button type="button" id="btn-email" class="btn btn-outline-primary active" onclick="setLoginMode('email')">Email</button>
                <button type="button" id="btn-username" class="btn btn-outline-primary" onclick="setLoginMode('username')">Username</button>
            </div>
        </div>

        <div class="mb-3" id="email-group">
            <label class="form-label">Email</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="Enter email" required>
        </div>

        <div class="mb-3 d-none" id="username-group">
            <label class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Enter username">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>

        <button class="btn btn-primary w-100 btn-login">Login</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function setLoginMode(mode) {
    const emailGroup = document.getElementById("email-group");
    const usernameGroup = document.getElementById("username-group");
    const emailInput = document.getElementById("email");
    const usernameInput = document.getElementById("username");
    const modeInput = document.getElementById("login_mode");
    const emailBtn = document.getElementById("btn-email");
    const usernameBtn = document.getElementById("btn-username");

    modeInput.value = mode;

    if (mode === "username") {
        emailGroup.classList.add("d-none");
        usernameGroup.classList.remove("d-none");
        emailInput.required = false;
        emailInput.disabled = true;
        usernameInput.required = true;
        usernameInput.disabled = false;
        emailBtn.classList.remove("active");
        usernameBtn.classList.add("active");
    } else {
        usernameGroup.classList.add("d-none");
        emailGroup.classList.remove("d-none");
        usernameInput.required = false;
        usernameInput.disabled = true;
        emailInput.required = true;
        emailInput.disabled = false;
        usernameBtn.classList.remove("active");
        emailBtn.classList.add("active");
    }
}
setLoginMode("email");
</script>
</body>
</html>
