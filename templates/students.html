{% extends "base.html" %}
{% block content %}

<style>
.students-page {
    position: relative;
    min-height: 100vh;
    padding: 20px;
    border-radius: 20px;
    background: linear-gradient(140deg, #eff6ff 0%, #eef2ff 45%, #ecfeff 100%);
    overflow: hidden;
}

.students-page::before,
.students-page::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    z-index: 0;
}

.students-page::before {
    width: 240px;
    height: 240px;
    right: -90px;
    top: -90px;
    background: rgba(59, 130, 246, 0.24);
}

.students-page::after {
    width: 210px;
    height: 210px;
    left: -80px;
    bottom: -90px;
    background: rgba(16, 185, 129, 0.2);
}

.students-header,
.students-form-card,
.students-table-card {
    position: relative;
    z-index: 1;
}

.students-header h3 {
    margin-bottom: 4px;
    font-weight: 800;
    color: #2563eb;
}

.students-header p {
    color: #64748b;
    margin-bottom: 16px;
}

.students-form-card,
.students-table-card {
    background: rgba(255, 255, 255, 0.85);
    border: 1px solid #dbe4f0;
    border-radius: 16px;
    box-shadow: 0 14px 28px rgba(15, 23, 42, 0.08);
    backdrop-filter: blur(5px);
}

.students-form-card {
    padding: 16px;
    margin-bottom: 16px;
}

.students-table-card {
    padding: 14px;
}

.students-form-card .form-control {
    border-radius: 12px;
    border-color: #cbd5e1;
}

.students-form-card .btn-primary {
    border-radius: 12px;
}

.students-table-card .table {
    margin: 0;
}

.badge-dept {
    background: #dcfce7;
    color: #065f46;
    font-weight: 700;
    border-radius: 999px;
    padding: 6px 10px;
}

.profile-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 999px;
    padding: 4px 10px;
    font-weight: 700;
}

.profile-link .mini-logo {
    width: 18px;
    height: 18px;
    object-fit: contain;
}

@media (max-width: 768px) {
    .students-page {
        padding: 14px;
    }
}
</style>

<div class="students-page">
    <div class="students-header">
        <h3>Students</h3>
        <p>Maintain student records with a cleaner and more structured view.</p>
    </div>

    <div class="students-form-card">
        <form method="GET" class="row g-2 align-items-end">
            <div class="col-md-5">
                <label class="form-label">Search by Name / Roll</label>
                <input name="q" value="{{ search_query }}" class="form-control" placeholder="e.g. 101 or arun">
            </div>
            <div class="col-md-4">
                <label class="form-label">Department</label>
                <select name="dept" class="form-control">
                    <option value="">All Departments</option>
                    {% for dept in departments %}
                    <option value="{{ dept }}" {% if dept_filter == dept %}selected{% endif %}>{{ dept }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3 d-grid">
                <button class="btn btn-outline-primary">Apply Filter</button>
            </div>
        </form>
        <div class="d-flex justify-content-end mt-2">
            <a href="/export/students" class="btn btn-sm btn-outline-dark">Export CSV</a>
        </div>
    </div>

    <div class="students-form-card">
        <form method="POST" class="row g-2">
            <div class="col-md-3"><input name="roll" class="form-control" placeholder="Roll" required></div>
            <div class="col-md-3"><input name="name" class="form-control" placeholder="Name" required></div>
            <div class="col-md-3"><input name="dept" class="form-control" placeholder="Department" required></div>
            <div class="col-md-3 d-grid"><button class="btn btn-primary">Add Student</button></div>
        </form>
    </div>

    <div class="students-table-card">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>Profile</th>
                        <th>S.No</th>
                        <th>Roll</th>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in students %}
                    <tr>
                        <td>
                            <a href="/dashboard?student_roll={{ s.roll_no }}" class="btn btn-sm btn-outline-primary profile-link" title="Open student profile" aria-label="Open student profile">
                                <img src="{{ url_for('static', filename='logo-mark.svg') }}" alt="Profile logo" class="mini-logo">
                            </a>
                        </td>
                        <td>{{ loop.index }}</td>
                        <td>{{ s.roll_no }}</td>
                        <td>{{ s.name }}</td>
                        <td><span class="badge-dept">{{ s.dept }}</span></td>
                        <td>
                            <a href="/delete_student/{{ s.roll_no }}" class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this student?')">
                               Delete
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}
